<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up — NexBid</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800;900&family=Space+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="bg-animation">
  <div class="particle" style="--delay:0s;--x:20%;--y:30%"></div>
  <div class="particle" style="--delay:2s;--x:75%;--y:60%"></div>
</div>
<div class="grid-overlay"></div>

<div class="auth-page">
  <a href="{{ url_for('index') }}" class="auth-back">← Back to Home</a>

  <div class="form-container" style="max-width:500px;">
    <div style="font-size:2.5rem;margin-bottom:1rem;text-align:center;">◎</div>
    <h1 class="form-title" style="text-align:center;">Create Account</h1>
    <p class="form-subtitle" style="text-align:center;">Join NexBid and start bidding</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="flash-messages">
          {% for category, message in messages %}
            <div class="flash {{ category }}">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <form method="POST">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" placeholder="Choose a username" required>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="At least 6 characters" required minlength="6">
      </div>
      <div class="form-group">
        <label class="form-label">Account Type</label>
        <select name="role" class="form-control">
          <option value="bidder">Bidder — I want to bid on items</option>
          <option value="seller">Seller — I want to list items for auction</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:0.85rem;">
        Create Account →
      </button>
    </form>

    <div class="form-footer">
      Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
    </div>
  </div>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
