{% extends 'base.html' %}
{% block title %}List Item — NexBid{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <a href="{{ url_for('dashboard') }}" style="color:rgba(255,255,255,0.5);text-decoration:none;font-size:0.85rem;font-weight:600;">← Back to Dashboard</a>
    <h1 style="margin-top:0.4rem;">List New Item</h1>
    <p class="page-subtitle">Create an auction listing for your item</p>
  </div>
</div>

<div style="max-width:600px;">
  <div class="glass-card" style="padding:2.5rem;">
    <form method="POST">
      <div class="form-group">
        <label class="form-label">Item Title *</label>
        <input type="text" name="title" class="form-control" placeholder="e.g. Vintage Rolex Submariner 1962" required>
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea name="description" class="form-control" placeholder="Describe the item in detail..."></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Image URL (optional)</label>
        <input type="url" name="image_url" class="form-control" placeholder="https://example.com/image.jpg">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
        <div class="form-group">
          <label class="form-label">Starting Price (₹) *</label>
          <input type="number" name="starting_price" class="form-control" step="0.01" min="0.01" placeholder="0.00" required>
        </div>
        <div class="form-group">
          <label class="form-label">Auction Ends At *</label>
          <input type="datetime-local" name="expires_at" class="form-control" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:0.85rem;margin-top:0.5rem;">
        ＋ Create Listing →
      </button>
    </form>
  </div>
</div>

<script>
// Set min datetime to now
const input = document.querySelector('input[name=expires_at]');
if (input) {
  const now = new Date();
  now.setMinutes(now.getMinutes() + 10);
  now.setSeconds(0,0);
  input.min = now.toISOString().slice(0,16);
  const defaultEnd = new Date(now.getTime() + 7 * 24 * 60 * 60 * 1000);
  input.value = defaultEnd.toISOString().slice(0,16);
}
</script>
{% endblock %}
